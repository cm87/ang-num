<div class="container py-4">
  <div class="card shadow-sm border-0">
    <div class="card-body">
      <div class="d-flex flex-column flex-sm-row justify-content-between align-items-start align-items-sm-center gap-2 mb-4">
        <h2 class="m-0 fw-bold text-primary">Numbers Generator</h2>
        <div class="d-flex flex-wrap gap-2 align-items-center">
          <label for="rowCount" class="text-secondary mb-0">Rows:</label>
          <input
            id="rowCount"
            type="number"
            class="form-control"
            style="width: 4.5rem;"
            [(ngModel)]="rowCount"
            [min]="1"
            [max]="maxRows"
          />
          <button type="button" class="btn btn-icon btn-generate" title="Generate" aria-label="Generate numbers" (click)="generate()">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 16 16">
              <path fill-rule="evenodd" d="M8 3a5 5 0 1 0 4.546 2.914.5.5 0 0 1 .908-.417A6 6 0 1 1 8 2v1z"/>
              <path d="M8 4.466V.534a.25.25 0 0 1 .41-.192l2.36 1.966c.12.1.12.284 0 .384L8.41 4.658A.25.25 0 0 1 8 4.466z"/>
            </svg>
          </button>
          <button type="button" class="btn btn-icon btn-clear" title="Clear" aria-label="Clear numbers" (click)="clear()">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 16 16">
              <path d="M5.5 5.5A.5.5 0 0 1 6 6v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5zm2.5 0a.5.5 0 0 1 .5.5v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5zm3 .5a.5.5 0 0 0-1 0v6a.5.5 0 0 0 1 0V6z"/>
              <path fill-rule="evenodd" d="M14.5 3a1 1 0 0 1-1 1H13v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V4h-.5a1 1 0 0 1-1-1V2a1 1 0 0 1 1-1H6a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1h3.5a1 1 0 0 1 1 1v1zM4.118 4 4 4.059V13a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1V4.059L11.882 4H4.118zM2.5 3V2h11v1h-11z"/>
            </svg>
          </button>
        </div>
      </div>

      @if (numberList().length === 0) {
        <div class="text-center text-muted py-4">
          <p class="mb-0">Choose the number of rows and click <strong>Generate</strong> to create your numbers.</p>
        </div>
      }

      @if (numberList().length > 0) {
        <div class="row-list">
          @for (numbers of numberList(); track $index) {
            <div class="row-card">
              <div class="row-label">Row {{ $index + 1 }}</div>
              <div class="row-balls">
                @for (n of numbers.slice(0, 6); track n) {
                  <span class="number-ball">{{ n }}</span>
                }
                <span class="number-ball superstar">{{ numbers[6] }}</span>
              </div>
            </div>
          }
        </div>
      }
    </div>
  </div>
</div>
